name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
      with:
        # Only write to the cache for builds on the 'master' branch.
        # PRs will read from the 'master' branch cache.
        cache-read-only: ${{ github.ref != 'refs/heads/master' }}

    - name: Make Gradle Wrapper Executable
      run: chmod +x ./gradlew

    - name: Build, Test, and Run QA Checks (Checkstyle, PMD)
      # The 'build' task in Gradle will run assemble, check (which includes tests, checkstyle, and PMD)
      # We use --continue so if a QA check fails, it continues to run others and generate all reports.
      run: ./gradlew build jacocoTestReport --no-daemon --continue

    - name: Upload Test Results
      if: always() # Always run this step even if tests fail
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: test-results
        path: |
          **/build/reports/tests/
          **/build/test-results/
        retention-days: 7

    - name: Upload Jacoco Coverage Report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: jacoco-coverage-report
        path: |
          **/build/reports/jacoco/test/html/
          **/build/reports/jacoco/test/jacocoTestReport.xml
        retention-days: 14

    - name: Gather SARIF Reports
      if: always()
      run: |
        mkdir -p sarif-reports
        find . -path "*/build/reports/*" \( -name "*.sarif" -o -name "*.sarif.json" \) | while read -r file; do
            filename=$(basename "$file" .json)
            tool=$(basename $(dirname "$file"))
            module=$(echo "$file" | cut -d'/' -f2)
            category="${module}-${tool}-${filename%.sarif}"
            jq --arg cat "$category" '.runs |= [to_entries[] | .value + {automationDetails: {id: ($cat + "-" + (.key|tostring))}}]' "$file" > "sarif-reports/${module}-${tool}-${filename}"
        done

    - name: Upload SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
      with:
        sarif_file: sarif-reports/
        wait-for-processing: true

    - name: Upload Static Analysis Reports (Checkstyle & PMD)
      if: failure() # Only upload if the build failed (e.g., due to a linter error)
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: static-analysis-reports
        path: |
          **/build/reports/checkstyle/
          **/build/reports/pmd/
        retention-days: 7
